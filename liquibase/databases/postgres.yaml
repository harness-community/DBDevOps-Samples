  - changeSet:
      id: product-table-v3
      author: harness
      labels: products-api
      comment: "v3: Add sku, description, category, stock_quantity, is_available, timestamps to product table"
      changes:
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: sku
                  type: VARCHAR(50)
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: description
                  type: TEXT
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: category
                  type: VARCHAR(80)
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: stock_quantity
                  type: INTEGER
                  defaultValueNumeric: 0
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: is_available
                  type: BOOLEAN
                  defaultValueBoolean: true
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
        - addColumn:
            tableName: product
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
      rollback:
        - dropColumn:
            tableName: product
            columnName: sku
        - dropColumn:
            tableName: product
            columnName: description
        - dropColumn:
            tableName: product
            columnName: category
        - dropColumn:
            tableName: product
            columnName: stock_quantity
        - dropColumn:
            tableName: product
            columnName: is_available
        - dropColumn:
            tableName: product
            columnName: created_at
        - dropColumn:
            tableName: product
            columnName: updated_at

  - changeSet:
      id: product-backfill-v3
      author: harness
      labels: products-api
      comment: "v3: Backfill sku, category, stock_quantity for all existing product rows"
      changes:
        - sql:
            sql: |
              UPDATE product SET sku = CONCAT('LEGACY-', LPAD(id::text, 4, '0')),
                                 category = 'Uncategorised',
                                 stock_quantity = 0,
                                 is_available = true
              WHERE sku IS NULL;
      rollback:
        - sql:
            sql: |
              UPDATE product SET sku = NULL, category = NULL
              WHERE sku LIKE 'LEGACY-%';

  - changeSet:
      id: product-sku-unique-constraint-v3
      author: harness
      labels: products-api
      comment: "v3: Add unique constraint on sku column after backfill"
      changes:
        - addUniqueConstraint:
            tableName: product
            columnNames: sku
            constraintName: uq_product_sku
      rollback:
        - dropUniqueConstraint:
            tableName: product
            constraintName: uq_product_sku

  - changeSet:
      id: product-table-indexes-v3
      author: harness
      labels: products-api
      comment: "v3: Indexes on category, sku, and is_available"
      changes:
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: category
            indexName: idx_products_category
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: sku
            indexName: idx_products_sku
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: is_available
            indexName: idx_products_is_available
      rollback:
        - dropIndex:
            indexName: idx_products_category
            tableName: product
        - dropIndex:
            indexName: idx_products_sku
            tableName: product
        - dropIndex:
            indexName: idx_products_is_available
            tableName: product

