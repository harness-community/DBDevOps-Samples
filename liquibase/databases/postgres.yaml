
# ╔════════════════════════════════════════════════════════════════════════════════════╗
# ║  This file contains Liquibase changesets for the product table and sample data.    ║
# ║  It has multiple changesets for creating the table, adding indexes,                ║
# ║  inserting sample data, and production catalog data, with rollback statements.     ║
# ║  The sample data is split into dev/staging/qa and production contexts, with        ║
# ║  different rows for each environment.                                              ║
# ╚════════════════════════════════════════════════════════════════════════════════════╝

databaseChangeLog:
  - changeSet:
      id: product-table-v2
      author: harness
      labels: products-api
      comment: Creating product table for REST API
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: NUMERIC(10,2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: product

  - changeSet:
      id: product-table-indexes-v2
      author: harness
      labels: products-api
      comment: Adding indexes for the products table
      changes:
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: name
            indexName: idx_products_name
      rollback:
        - dropIndex:
            indexName: idx_products_name
            tableName: product

  - changeSet:
      id: product-sample-data-initial
      author: harness
      labels: products-api-v2
      context: "dev,staging,qa"
      comment: Inserting initial sample data for non-production environments
      changes:
        - insert:
            tableName: product
            columns:
              - column:
                  name: name
                  value: "Wireless Bluetooth Headphones"
              - column:
                  name: price
                  value: 89.99
        - insert:
            tableName: product
            columns:
              - column:
                  name: name
                  value: "USB-C Charging Cable"
              - column:
                  name: price
                  value: 15.99
      rollback:
        - delete:
            tableName: product
            where: name in ('Wireless Bluetooth Headphones', 'USB-C Charging Cable')

